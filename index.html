<!DOCTYPE html>
<html>
<head>
<title>PromptForge AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
background:#0b1220;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1{
text-align:center;
color:#4f8cff;
}
  textarea{
width:100%;
height:200px;
padding:12px;
border:none;
border-radius:10px;
background:#111827;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}
  #output{
margin-top:20px;
background:#111827;
padding:15px;
border-radius:10px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<h1>PromptForge AI</h1>

<textarea id="story"
placeholder="Paste your story here"></textarea>

<button onclick="generatePrompt()">
Generate Prompt
</button>

<div id="output"></div>
<script>
function generatePrompt(){

let story =
document.getElementById("story").value;

let prompt =
"Ultra realistic cinematic scene, " +
story +
", dramatic lighting, masterpiece, 8K";

document.getElementById("output").innerText =
prompt;

}
</script>

</body>
</html>
